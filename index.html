<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>NRD Check Flow</title>
  <style>
    :root{
      --bg1:#04101d;
      --bg2:#071c34;
      --card:#ffffff;
      --text:#0b1220;
      --muted:#64748b;
      --stroke:#d6dde8;
      --o2:#005EB8;
      --o2-dark:#004A93;
      --red:#E4002B;
      --red-dark:#B80022;
      --radius:24px;
      --shadow-soft:0 10px 26px rgba(2,6,23,.14);
      --max:980px;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:Arial,Helvetica,sans-serif;
      background:linear-gradient(90deg,var(--bg1),var(--bg2));
      color:var(--text);
    }

    .shell{max-width:var(--max);margin:0 auto;padding:12px 14px 28px}

    .brand{display:flex;align-items:center;gap:12px;color:#fff;margin-bottom:14px}
    .logo{
      width:44px;height:44px;border-radius:14px;
      background:linear-gradient(135deg,var(--o2) 0 68%,var(--red) 68% 100%);
      flex:0 0 auto;
    }
    .brand h1{margin:0;font-size:1.1rem;line-height:1.1}
    .brand p{margin:3px 0 0;font-size:.9rem;color:#dce7f6}

    .hero{
      background:linear-gradient(135deg,rgba(0,94,184,.18),rgba(228,0,43,.14));
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      border-radius:28px;
      padding:18px;
      margin-bottom:14px;
    }
    .hero h2{margin:0 0 6px;font-size:1.35rem}
    .hero p{margin:0;color:#dce7f6;line-height:1.45}

    .card{
      background:var(--card);
      border:1px solid var(--stroke);
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow-soft);
    }

    .meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
    .pill{
      display:inline-flex;align-items:center;
      padding:8px 12px;border-radius:999px;font-size:.9rem;font-weight:700;
      background:#eff6ff;color:var(--o2);border:1px solid #cfe2ff;
    }
    .pill.warn{background:#fff6e6;color:#b66a00;border-color:#f3d59a}
    .pill.good{background:#ebfbf5;color:#0b6b58;border-color:#bde8d7}

    .step-title{margin:0 0 10px;font-size:1.7rem;line-height:1.2}
    .step-body{margin:0 0 18px;color:#334155;line-height:1.55;font-size:1rem}

    .actions{display:grid;gap:12px}
    .btn{
      appearance:none;border:none;cursor:pointer;border-radius:20px;padding:16px 18px;
      font-size:1rem;font-weight:800;line-height:1.25;text-align:left;
      transition:transform .08s ease, background .2s ease;
    }
    .btn:active{transform:scale(.99)}
    .btn-yes{background:var(--o2);color:#fff}
    .btn-yes:hover{background:var(--o2-dark)}
    .btn-no{background:var(--red);color:#fff}
    .btn-no:hover{background:var(--red-dark)}
    .btn-neutral{background:#eef2f7;color:#0f172a}
    .btn-neutral:hover{background:#e5ebf3}

    .result{
      border:1px solid var(--stroke);
      background:#fafcff;
      border-radius:22px;
      padding:16px;
      margin-top:8px;
    }
    .result h3{margin:0 0 8px;font-size:1.1rem}
    .result p{margin:0;line-height:1.55;color:#334155}

    .footer-actions{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;padding-top:16px;border-top:1px dashed var(--stroke);
    }
    .footer-btn{
      appearance:none;border:1px solid var(--stroke);background:#fff;cursor:pointer;
      border-radius:18px;padding:14px 18px;font-size:1rem;font-weight:800;color:#16335f;
    }
    .footer-btn:disabled{opacity:.45;cursor:not-allowed}

    .path{margin-top:14px;color:var(--muted);font-size:.95rem}
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <div class="logo" aria-hidden="true"></div>
      <div>
        <h1>Virgin Media O2</h1>
        <p>NRD decision flow</p>
      </div>
    </div>

    <section class="hero">
      <h2>NRD Check Flow</h2>
      <p>Follow the route below based on the outcome of the NRD check.</p>
    </section>

    <main class="card">
      <div class="meta">
        <span class="pill" id="stepCounter">Step 1</span>
        <span class="pill warn">NRD Flow</span>
        <span class="pill good">Draft</span>
      </div>

      <h2 class="step-title" id="stepTitle"></h2>
      <p class="step-body" id="stepBody"></p>

      <div class="actions" id="actions"></div>

      <div class="result" id="resultBox" style="display:none;">
        <h3 id="resultTitle"></h3>
        <p id="resultBody"></p>
      </div>

      <div class="footer-actions">
        <button class="footer-btn" id="backBtn" type="button">Back</button>
        <button class="footer-btn" id="restartBtn" type="button">Restart</button>
      </div>

      <div class="path" id="pathTrail">Path: Start</div>
    </main>
  </div>

  <script>
    const flow = {
      start: {
        title: 'NRD check OK?',
        body: 'Select the outcome of the NRD check to continue.',
        buttons: [
          { label: 'Yes', className: 'btn-yes', next: 'complete_nrd' },
          { label: 'No', className: 'btn-no', next: 'no_reason' }
        ]
      },
      complete_nrd: {
        resultTitle: 'Complete NRD form with details',
        resultBody: 'The NRD check is OK. Complete the NRD form and include all relevant details clearly.'
      },
      no_reason: {
        title: 'What is the reason?',
        body: 'Select the issue to follow the correct route.',
        buttons: [
          { label: 'Tree issue', className: 'btn-neutral', next: 'submit_forms' },
          { label: 'JUP / D / Hollow Pole', className: 'btn-neutral', next: 'submit_forms' },
          { label: 'Line of sight', className: 'btn-neutral', next: 'submit_forms' },
          { label: 'Wayleave', className: 'btn-neutral', next: 'submit_forms' },
          { label: 'Traffic management', className: 'btn-neutral', next: 'submit_forms' },
          { label: 'Oversubscribed', className: 'btn-neutral', next: 'submit_forms' },
          { label: 'PON ID / DP change needed', className: 'btn-yes', next: 'email_xgs' }
        ]
      },
      submit_forms: {
        title: 'Next step',
        body: 'Submit the required forms or request licences for this issue.',
        buttons: [
          { label: 'Done', className: 'btn-yes', next: 'inform_liam_marcus' }
        ]
      },
      email_xgs: {
        title: 'Next step',
        body: 'Email XGS regarding the required PON ID or DP change.',
        buttons: [
          { label: 'Done', className: 'btn-yes', next: 'inform_liam_marcus' }
        ]
      },
      inform_liam_marcus: {
        resultTitle: 'Inform Liam and Marcus',
        resultBody: 'Once the action has been completed, inform Liam and Marcus.'
      }
    };

    const state = {
      current: 'start',
      history: [],
      labels: []
    };

    const stepCounter = document.getElementById('stepCounter');
    const stepTitle = document.getElementById('stepTitle');
    const stepBody = document.getElementById('stepBody');
    const actions = document.getElementById('actions');
    const resultBox = document.getElementById('resultBox');
    const resultTitle = document.getElementById('resultTitle');
    const resultBody = document.getElementById('resultBody');
    const backBtn = document.getElementById('backBtn');
    const restartBtn = document.getElementById('restartBtn');
    const pathTrail = document.getElementById('pathTrail');

    function render() {
      const node = flow[state.current];
      const stepNum = state.history.length + 1;
      stepCounter.textContent = `Step ${stepNum}`;
      actions.innerHTML = '';

      if (node.resultTitle) {
        stepTitle.textContent = 'Outcome';
        stepBody.textContent = 'Follow the instruction below.';
        resultTitle.textContent = node.resultTitle;
        resultBody.textContent = node.resultBody;
        resultBox.style.display = 'block';
      } else {
        stepTitle.textContent = node.title;
        stepBody.textContent = node.body;
        resultBox.style.display = 'none';

        node.buttons.forEach((button) => {
          const el = document.createElement('button');
          el.type = 'button';
          el.className = `btn ${button.className}`;
          el.textContent = button.label;
          el.addEventListener('click', () => {
            state.history.push(state.current);
            state.labels.push(button.label);
            state.current = button.next;
            render();
          });
          actions.appendChild(el);
        });
      }

      backBtn.disabled = state.history.length === 0;
      pathTrail.textContent = `Path: Start${state.labels.length ? ' → ' + state.labels.join(' → ') : ''}`;
    }

    backBtn.addEventListener('click', () => {
      if (!state.history.length) return;
      state.current = state.history.pop();
      state.labels.pop();
      render();
    });

    restartBtn.addEventListener('click', () => {
      state.current = 'start';
      state.history = [];
      state.labels = [];
      render();
    });

    render();
  </script>
</body>
</html>
